name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Verify (test, clippy, fmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error title=Missing crates.io publish secret::Configure the repository Actions secret CRATES_IO_TOKEN or CARGO_REGISTRY_TOKEN with a crates.io API token before pushing a release tag."
            exit 1
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Query crates.io directly so the skip check cannot resolve to the local workspace package.
          crate_version_published() {
            local crate="$1"
            local version="$2"
            local probe_dir
            local output
            local status

            probe_dir="$(mktemp -d)"
            output="$(
              cd "${probe_dir}" &&
              cargo info "${crate}@${version}" --registry crates-io 2>&1
            )"
            status=$?
            rm -rf "${probe_dir}"

            if [[ ${status} -eq 0 ]]; then
              return 0
            fi

            if grep -Fq "could not find \`${crate}@${version}\` in registry" <<<"${output}"; then
              return 1
            fi

            echo "${output}" >&2
            return 2
          }

          sleep_for_rate_limit() {
            local output="$1"
            local retry_after
            local retry_epoch
            local now_epoch
            local sleep_seconds

            retry_after="$(sed -n 's/.*Please try again after \(.* GMT\).*/\1/p' <<<"${output}" | head -1)"
            retry_epoch=""

            if [[ -n "${retry_after}" ]]; then
              retry_epoch="$(date -u -d "${retry_after}" +%s 2>/dev/null || true)"
            fi

            now_epoch="$(date -u +%s)"
            if [[ -n "${retry_epoch}" ]]; then
              sleep_seconds=$(( retry_epoch - now_epoch + 5 ))
            else
              sleep_seconds=300
            fi

            if [[ ${sleep_seconds} -lt 5 ]]; then
              sleep_seconds=5
            fi

            echo "crates.io rate limit hit; sleeping ${sleep_seconds}s before retry"
            sleep "${sleep_seconds}"
          }

          publish_crate_with_retry() {
            local crate="$1"
            local version="$2"
            local manifest_path="$3"
            local output
            local status

            for attempt in {1..5}; do
              set +e
              output="$(cargo publish --manifest-path "${manifest_path}" 2>&1)"
              status=$?
              set -e

              if [[ ${status} -eq 0 ]]; then
                echo "${output}"
                return 0
              fi

              echo "${output}" >&2

              if grep -Fq "status 429 Too Many Requests" <<<"${output}" || grep -Fq "You have published too many new crates in a short period of time" <<<"${output}"; then
                if [[ ${attempt} -lt 5 ]]; then
                  echo "Retrying ${crate}@${version} after crates.io rate limit (attempt ${attempt}/5)"
                  sleep_for_rate_limit "${output}"
                  continue
                fi
              fi

              return "${status}"
            done
          }

          crates=(
            buildfix-hash
            buildfix-types
            buildfix-adapter-sdk
            buildfix-edit
            buildfix-fixer-catalog
            buildfix-receipts
            buildfix-render
            buildfix-artifacts
            buildfix-core-runtime
            buildfix-fixer-api
            buildfix-report
            buildfix-receipts-cargo-audit
            buildfix-receipts-cargo-audit-freeze
            buildfix-receipts-cargo-bloat
            buildfix-receipts-cargo-crev
            buildfix-receipts-cargo-cyclonedds
            buildfix-receipts-cargo-deny
            buildfix-receipts-cargo-geiger
            buildfix-receipts-cargo-krate
            buildfix-receipts-cargo-llvm-lines
            buildfix-receipts-cargo-lock
            buildfix-receipts-cargo-machete
            buildfix-receipts-cargo-miri
            buildfix-receipts-cargo-msrv
            buildfix-receipts-cargo-outdated
            buildfix-receipts-cargo-sec-audit
            buildfix-receipts-cargo-semver-checks
            buildfix-receipts-cargo-spellcheck
            buildfix-receipts-cargo-tree
            buildfix-receipts-cargo-udeps
            buildfix-receipts-cargo-unused-function
            buildfix-receipts-cargo-update
            buildfix-receipts-cargo-warn
            buildfix-receipts-clippy
            buildfix-receipts-depguard
            buildfix-receipts-rustc-json
            buildfix-receipts-rustfmt
            buildfix-receipts-sarif
            buildfix-receipts-tarpaulin
            buildfix-domain-policy
            buildfix-fixer-duplicate-deps
            buildfix-fixer-edition
            buildfix-fixer-license
            buildfix-fixer-msrv
            buildfix-fixer-path-dep-version
            buildfix-fixer-remove-unused-deps
            buildfix-fixer-resolver-v2
            buildfix-fixer-workspace-inheritance
            buildfix-domain
            buildfix-core
            buildfix
          )

          for crate in "${crates[@]}"; do
            manifest_path="$(grep -l "name = \"${crate}\"" */Cargo.toml 2>/dev/null | head -1)"
            if [[ -z "${manifest_path}" ]]; then
              echo "Could not find manifest for ${crate}"
              exit 1
            fi

            version="$(grep '^version = ' "${manifest_path}" | head -1 | cut -d'"' -f2)"
            if crate_version_published "${crate}" "${version}"; then
              echo "Skipping already published ${crate}@${version}"
              continue
            else
              status=$?
              if [[ ${status} -eq 2 ]]; then
                echo "Could not verify publication status for ${crate}@${version}"
                exit 1
              fi
            fi

            echo "Publishing ${crate}@${version} from ${manifest_path}"
            publish_crate_with_retry "${crate}" "${version}" "${manifest_path}"
            sleep 30
          done

          release_version="${GITHUB_REF_NAME#v}"
          for attempt in {1..20}; do
            if crate_version_published buildfix "${release_version}"; then
              echo "Verified buildfix@${release_version} on crates.io"
              exit 0
            else
              status=$?
              if [[ ${status} -eq 2 ]]; then
                echo "Could not verify publication status for buildfix@${release_version}"
                exit 1
              fi
            fi

            echo "Waiting for buildfix@${release_version} to appear on crates.io (attempt ${attempt}/20)"
            sleep 15
          done

          echo "buildfix@${release_version} did not appear on crates.io after publish"
          exit 1

