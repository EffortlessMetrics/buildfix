name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo run -p buildfix -- validate

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings --ignore RUSTSEC-2024-0384

  msrv:
    name: MSRV (1.92.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo test --workspace --exclude buildfix-bdd

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude buildfix-bdd

  locked-install-smoke:
    name: Locked Install Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install buildfix with locked dependencies
        shell: bash
        run: |
          export CARGO_HOME="$RUNNER_TEMP/cargo-home"
          export CARGO_INSTALL_ROOT="$RUNNER_TEMP/buildfix-install"
          cargo install --path buildfix-cli --locked --root "$CARGO_INSTALL_ROOT"
          "$CARGO_INSTALL_ROOT/bin/buildfix" --help
          "$CARGO_INSTALL_ROOT/bin/buildfix" list-fixes

  bdd:
    name: BDD Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p buildfix
      - run: cargo test -p buildfix-bdd

  conform:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate artifacts
        run: cargo run -p buildfix -- plan --repo-root tests/fixtures/msrv_normalize/repo --artifacts-dir tests/fixtures/msrv_normalize/receipts --out-dir temp_artifacts
      - name: Run conformance check
        run: cargo run -p xtask -- conform --artifacts-dir temp_artifacts

  package-list:
    name: Package file list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo package --list -p buildfix-hash
          cargo package --list -p buildfix-types
          cargo package --list -p buildfix-edit
          cargo package --list -p buildfix-fixer-catalog
          cargo package --list -p buildfix-receipts
          cargo package --list -p buildfix-core-runtime
          cargo package --list -p buildfix-fixer-api
          cargo package --list -p buildfix-domain-policy
          cargo package --list -p buildfix-fixer-duplicate-deps
          cargo package --list -p buildfix-fixer-edition
          cargo package --list -p buildfix-fixer-license
          cargo package --list -p buildfix-fixer-msrv
          cargo package --list -p buildfix-fixer-path-dep-version
          cargo package --list -p buildfix-fixer-remove-unused-deps
          cargo package --list -p buildfix-fixer-resolver-v2
          cargo package --list -p buildfix-fixer-workspace-inheritance
          cargo package --list -p buildfix-domain
          cargo package --list -p buildfix-render
          cargo package --list -p buildfix-artifacts
          cargo package --list -p buildfix-report
          cargo package --list -p buildfix-core
          cargo package --list -p buildfix

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
